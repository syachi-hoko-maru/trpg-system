name: cd

on:
  push:
    branches: [n3]
  pull_request:
    branches: [n3]
  repository_dispatch:
    types:
      - my-custom-type

jobs:
  cd:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [18]

    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup node env
        uses: actions/setup-node@v2.1.2
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: yarn

      - name: Pre-Generate
        run: yarn pre

      - name: Generate
        run: yarn generate

      - name: After-Generate
        run: yarn after

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public
