name: cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types:
      - my-custom-type
  workflow_dispatch:

jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js env
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn

      - name: Pre-Generate
        run: yarn pre

      - name: Generate
        run: yarn generate

      - name: After-Generate
        run: yarn after

      - name: Setup Pages
        uses: actions/configure-pages@v1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: "./.output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@main
